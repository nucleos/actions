name: 'Continuous Integration'

on:
  workflow_call:
    inputs:
      PHP_EXTENSIONS:
        default: ''
        required: false
        type: string
      PHP_VERSIONS:
        default: '8.3,8.4,8.5'
        required: false
        type: string
      SYMFONY_VERSIONS:
        default: '6.4,7.2'
        required: false
        type: string
      SYMFONY_KERNEL:
        default: ''
        required: false
        type: string
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  generate-matrix:
    name: "Generate test matrix"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    steps:
      - id: "set-php-matrix"
        uses: "actions/github-script@v9"
        env:
          PHP_VERSIONS: '${{ inputs.PHP_VERSIONS }}'
        with:
          script: |
            const { PHP_VERSIONS } = process.env
            return "[\"" + (PHP_VERSIONS.split(",").map(s => s.trim()).join("\", \"")) + "\"]"
          result-encoding: string

      - id: "set-symfony-matrix"
        uses: "actions/github-script@v9"
        env:
          SYMFONY_VERSIONS: '${{ inputs.SYMFONY_VERSIONS }}'
        with:
          script: |
            const { SYMFONY_VERSIONS } = process.env
            return "[\"" + (SYMFONY_VERSIONS.split(",").map(s => s.trim()).join("\", \"")) + "\"]"
          result-encoding: string

      - id: "set-test-matrix"
        uses: "actions/github-script@v9"
        env:
          PHP_VERSIONS: '${{ inputs.PHP_VERSIONS }}'
          SYMFONY_VERSIONS: '${{ inputs.SYMFONY_VERSIONS }}'
        with:
          script: |
            const phpVersions = process.env.PHP_VERSIONS.split(",").map(s => s.trim()).filter(Boolean)
            const symfonyVersions = process.env.SYMFONY_VERSIONS.split(",").map(s => s.trim()).filter(Boolean)
            const dependencies = ["lowest", "highest"]
            const include = []
            for (const phpVersion of phpVersions) {
              for (const symfonyVersion of symfonyVersions) {
                // Exclude unsupported combinations: PHP 8.3 with Symfony 8.x
                if (phpVersion === "8.3" && symfonyVersion.startsWith("8.")) continue
                for (const dependency of dependencies) {
                  include.push({ "php-version": phpVersion, symfony: symfonyVersion, dependencies: dependency })
                }
              }
            }
            return JSON.stringify({ include })
          result-encoding: string

    outputs:
      php-matrix: "${{ steps.set-php-matrix.outputs.result }}"
      symfony-matrix: "${{ steps.set-symfony-matrix.outputs.result }}"
      test-matrix: "${{ steps.set-test-matrix.outputs.result }}"


  coding-standards:
    name: "Coding Standards"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix:
        php-version:
          - "8.5"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "none"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@4.0.0"

      - name: "Run php-cs-fixer"
        env:
            PHP_CS_FIXER_IGNORE_ENV: 1
        run: "make cs"

  static-code-analysis:
    name: "Static Code Analysis"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix:
        php-version:
          - "8.5"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "none"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@4.0.0"

      - name: "Run phpstan"
        run: "make phpstan"

      - name: "Run phpmd"
        run: "make phpmd"

  tests:
    name: "Test: PHP ${{ matrix.php-version }}, Symfony ${{ matrix.symfony }}, ${{ matrix.dependencies }})"

    needs: "generate-matrix"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix: "${{ fromJson(needs.generate-matrix.outputs.test-matrix) }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "none"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: 'Install Symfony Flex'
        run: | 
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --prefer-dist --no-progress --ansi symfony/flex

      - name: "Lock symfony version"
        run: "composer config extra.symfony.require ${{ matrix.symfony }}.*"
        if: "${{ matrix.symfony != '' }}"

      - name: "Install Composer dependencies (${{ matrix.dependencies }})"
        uses: "ramsey/composer-install@4.0.0"
        with:
          dependency-versions: "${{ matrix.dependencies }}"

      - name: "Run tests with phpunit"
        run: "make test"

  code-coverage:
    name: "Code Coverage"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix:
        php-version:
          - "8.5"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "pcov"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@4.0.0"

      - name: "Collect code coverage with pcov and phpunit"
        run: "make coverage"

      - name: "Send code coverage report to Codecov.io"
        env:
          CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"
        run: "bash <(curl -s https://codecov.io/bash)"

  mutation-tests:
    name: "Mutation Tests"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix:
        php-version:
          - "8.5"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "pcov"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@4.0.0"

  composer:
    name: "Lint composer.json"

    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    strategy:
      matrix:
        php-version:
          - "8.5"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP with extensions"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "pcov"
          extensions: "${{ inputs.PHP_EXTENSIONS }}"
          php-version: "${{ matrix.php-version }}"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@4.0.0"

      - name: "Lint composer.json"
        run: "make lint-composer"
